<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0;
    }

    .container {
      background: white;
      border-radius: 0;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 20px;
    }

    /* Settings Section */
    .settings-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .settings-title {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-icon {
      width: 16px;
      height: 16px;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .input-field::placeholder {
      color: #9ca3af;
    }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    .save-btn:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .save-btn:active {
      transform: translateY(0);
    }

    /* Profile Section */
    .profile-section {
      margin-bottom: 20px;
    }

    .profile-info {
      background: #f9fafb;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .profile-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .profile-item:last-child {
      margin-bottom: 0;
    }

    .profile-label {
      color: #6b7280;
      font-weight: 500;
    }

    .profile-value {
      color: #111827;
      font-weight: 600;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .add-btn:hover {
      background: #059669;
    }

    .add-btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* Status Messages */
    .status-message {
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .status-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .status-warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    /* Not on X Page */
    .not-x-page {
      text-align: center;
      padding: 30px 20px;
    }

    .not-x-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .not-x-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 10px;
    }

    .not-x-text {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 20px;
      color: #6b7280;
    }

    .spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Help text */
    .help-text {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 5px;
      line-height: 1.4;
    }

    .help-link {
      color: #667eea;
      text-decoration: none;
    }

    .help-link:hover {
      text-decoration: underline;
    }

    /* Status indicator */
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-connected {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }

    .status-disconnected {
      background: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>User Manager</h1>
      <p>Save X profiles with one click</p>
    </div>

    <div class="content">
      <!-- Settings Section -->
      <div id="settingsSection" class="settings-section">
        <div class="settings-title">
          <span>⚙️</span>
          Settings
        </div>

        <div class="input-group">
          <label class="input-label">API URL</label>
          <input 
            type="text" 
            id="apiUrl" 
            class="input-field" 
            placeholder="https://your-api.vercel.app/api"
          >
          <div class="help-text">Your Vercel API endpoint</div>
        </div>

        <div class="input-group">
          <label class="input-label">API Key</label>
          <input 
            type="password" 
            id="apiKey" 
            class="input-field" 
            placeholder="Enter your personal API key"
          >
          <div class="help-text">
            Get from: <a href="https://vercel.com" target="_blank" class="help-link">Vercel Dashboard</a> → Environment Variables
          </div>
        </div>

        <button id="saveSettings" class="save-btn">
          Save Settings
        </button>
      </div>

      <!-- Main Content -->
      <div id="mainContent">
        <!-- Loading State -->
        <div id="loadingState" style="display: none;">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
          </div>
        </div>

        <!-- Not on X Page -->
        <div id="notXPage" style="display: none;">
          <div class="not-x-page">
            <div class="not-x-icon">🐦</div>
            <h3 class="not-x-title">Not on X Profile Page</h3>
            <p class="not-x-text">
              Please navigate to an X (Twitter) profile page to use this extension.
            </p>
          </div>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" style="display: none;">
          <div class="profile-section">
            <div id="statusMessage" style="display: none;"></div>

            <div class="profile-info">
              <div class="profile-item">
                <span class="profile-label">Username:</span>
                <span class="profile-value" id="username">-</span>
              </div>
              <div class="profile-item">
                <span class="profile-label">User ID:</span>
                <span class="profile-value" id="userId">-</span>
              </div>
              <div class="profile-item">
                <span class="profile-label">URL:</span>
                <span class="profile-value" id="url">-</span>
              </div>
              <div class="profile-item">
                <span class="profile-label">Status:</span>
                <span class="profile-value">
                  <span id="connectionStatus"></span>
                </span>
              </div>
            </div>

            <button id="addUserBtn" class="add-btn">
              <span>➕</span>
              Add to User Manager
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Save X Profile</title>
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #1f2937;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    
    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      font-family: inherit;
    }
    
    input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    input:disabled {
      background-color: #f3f4f6;
      color: #6b7280;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: normal;
      margin: 0;
    }
    
    .checkbox-label input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
      cursor: pointer;
    }
    
    .checkbox-label span {
      user-select: none;
    }
    
    .help-text {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
      line-height: 1.4;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.2s;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #saveBtn {
      background-color: #10b981;
      color: white;
    }
    
    #saveBtn:hover:not(:disabled) {
      background-color: #059669;
    }
    
    #cancelBtn {
      background-color: #f3f4f6;
      color: #374151;
    }
    
    #cancelBtn:hover:not(:disabled) {
      background-color: #e5e7eb;
    }
    
    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    
    .success {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }
    
    .error {
      background-color: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    
    .warning {
      background-color: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }
    
    .info {
      background-color: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
      font-size: 13px;
    }
    
    .hidden {
      display: none;
    }
    
    .settings-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 12px;
      text-decoration: none;
      cursor: pointer;
    }
    
    .settings-link:hover {
      color: #4f46e5;
    }

    .not-x-page {
      text-align: center;
      padding: 20px;
    }

    .not-x-page h3 {
      color: #374151;
      margin: 10px 0;
    }

    .not-x-page p {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="notXPage" class="not-x-page hidden">
    <h2>🐦 Not on X Profile Page</h2>
    <p>Please navigate to an X (Twitter) profile page to save a user.</p>
    <a href="#" id="openSettings" class="settings-link">⚙️ Settings</a>
  </div>

  <div id="form">
    <h2>💾 Save X Profile</h2>
    
    <div id="message" class="message hidden"></div>
    
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="username" disabled>
    </div>
    
    <div class="form-group">
      <label for="url">URL</label>
      <input type="text" id="url" disabled>
    </div>
    
    <div class="form-group">
      <label for="userId">User ID</label>
      <input type="text" id="userId" placeholder="Auto-detected from URL" disabled>
      <div class="help-text">User ID is optional and auto-extracted when possible</div>
    </div>
    
    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" id="markAsRead">
        <span>Mark as read immediately</span>
      </label>
      <div class="help-text">
        If checked, this profile will be saved as already read.
      </div>
    </div>
    
    <div class="button-group">
      <button id="cancelBtn">Cancel</button>
      <button id="saveBtn">Save Profile</button>
    </div>
    
    <a href="#" id="settingsLink" class="settings-link">⚙️ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
